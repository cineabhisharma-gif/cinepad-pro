    function bindEvents() {
      const root = $("#root");
      root.addEventListener("click", handleClick);
      root.addEventListener("input", handleInput);
      root.addEventListener("change", handleChange);
    }

    function handleClick(event) {
      const el = event.target.closest("[data-action]");
      if (!el) return;
      const action = el.dataset.action;
      if (action === "nav") return navigate(el.dataset.key);
      if (action === "open-sidebar") { ui.sidebarOpen = true; return render(); }
      if (action === "close-sidebar") { ui.sidebarOpen = false; return render(); }
      if (action === "print-view") return window.print();
      if (action === "quick-add") return openNewEntry(el.dataset.target);
      if (action === "quick-add-task" || action === "new-task") return openTaskForm();
      if (action === "new-entry") return openNewEntry(el.dataset.section);
      if (action === "save-entry") return saveEntry(el.dataset.section);
      if (action === "edit-entry") return editEntry(el.dataset.section, el.dataset.id);
      if (action === "open-entry") return openEntry(el.dataset.section, el.dataset.id);
      if (action === "delete-entry") return deleteEntry(el.dataset.section, el.dataset.id);
      if (action === "cancel-form") return cancelForm();
      if (action === "save-task") return saveTask();
      if (action === "edit-task") return editTask(el.dataset.id);
      if (action === "delete-task") return deleteTask(el.dataset.id);
      if (action === "new-section") return openSectionForm();
      if (action === "edit-section") return editSection(el.dataset.key);
      if (action === "save-section") return saveSection();
      if (action === "toggle-section") return toggleSection(el.dataset.key);
      if (action === "delete-section") return deleteSection(el.dataset.key);
      if (action === "download-backup") return downloadBackup();
      if (action === "run-import") return runImport();
      if (action === "clear-search") { ui.search = ""; return render(); }
      if (action === "generate-workspace-id") return generateWorkspaceId();
      if (action === "save-sync-settings") return saveSyncSettings();
      if (action === "connect-sync") return connectSync();
      if (action === "push-sync") return pushCloudNow();
      if (action === "disable-sync") return disableSync();
      if (action === "toggle-recording") return toggleRecording();
      if (action === "new-voice-note") return openVoiceForm();
      if (action === "save-voice") return saveVoice();
      if (action === "edit-voice") return editVoice(el.dataset.id);
      if (action === "delete-voice") return deleteVoice(el.dataset.id);
      if (action === "delete-media") return deleteMedia(el.dataset.id);
      if (action === "restore-trash") return restoreTrashItem(el.dataset.id);
      if (action === "delete-trash") return deleteTrashForever(el.dataset.id);
      if (action === "empty-trash") return emptyTrash();
    }

    function handleInput(event) {
      const field = event.target.dataset.field;
      if (field === "global-search") { ui.search = event.target.value; return render(); }
      if (field === "import-text") { ui.importText = event.target.value; return; }
      if (field) ui.draft[field] = event.target.value;
      const sf = event.target.dataset.sectionField;
      if (sf) ui.sectionDraft[sf] = event.target.value;
      const setting = event.target.dataset.settingField;
      if (setting) state.settings[setting] = event.target.value;
      const temp = event.target.dataset.tempField;
      if (temp === "syncPassphrase") ui.syncPassphrase = event.target.value;
      if (event.target.dataset.action === "rename-media") renameMedia(event.target.dataset.id, event.target.value);
    }

    function handleChange(event) {
      const action = event.target.dataset.action;
      if (action === "move-task") return moveTask(event.target.dataset.id, event.target.value);
      if (action === "capture-media") return captureMedia(event.target.files?.[0]);
      const field = event.target.dataset.field;
      if (field) ui.draft[field] = event.target.value;
      const check = event.target.dataset.settingCheck;
      if (check) state.settings[check] = event.target.checked;
      const sf = event.target.dataset.sectionField;
      if (sf) ui.sectionDraft[sf] = event.target.value;
    }

    function navigate(key) {
      ui.active = key;
      ui.sidebarOpen = false;
      ui.formOpen = false;
      ui.editingId = null;
      ui.draft = {};
      ui.sectionDraft = {};
      render();
    }
    function cancelForm() { ui.formOpen = false; ui.editingId = null; ui.draft = {}; ui.sectionDraft = {}; render(); }
    function focusFirst() { setTimeout(() => $(".form-card .input, .form-card .textarea, .form-card .select")?.focus(), 0); }

    function ensureTrash() { if (!Array.isArray(state.trash)) state.trash = []; }
    function itemTitle(section, item) {
      if (!item) return "Untitled";
      if (section) return item[firstTitleField(section)] || item.title || item.name || "Untitled";
      return item.title || item.name || "Untitled";
    }
    function addToTrash(payload) {
      ensureTrash();
      const now = new Date().toISOString();
      state.trash.unshift({ id: uid(), deletedAt: now, appVersion: APP_VERSION, ...payload });
    }
    function trashTypeLabel(item) {
      const map = { entry: "Entry", task: "Task", voice: "Voice Note", media: "Media", section: "Section" };
      return map[item?.type] || "Item";
    }
    function trashPreview(item) {
      if (!item) return "";
      if (item.type === "section") return `${(item.entries || []).length} entries were removed with this section.`;
      const data = item.item || {};
      return data.notes || data.content || data.agenda || data.followup || data.project || data.contact || data.role || data.title || data.name || "No preview available.";
    }
    function restoreTrashItem(id) {
      ensureTrash();
      const item = state.trash.find(x => x.id === id);
      if (!item) return;
      let restoredKey = item.sourceKey || "trash";
      if (item.type === "entry") restoreEntryFromTrash(item);
      else if (item.type === "task") restoreTaskFromTrash(item);
      else if (item.type === "voice") restoreVoiceFromTrash(item);
      else if (item.type === "media") restoreMediaFromTrash(item);
      else if (item.type === "section") restoredKey = restoreSectionFromTrash(item);
      else return alert("This deleted item cannot be restored.");
      state.trash = state.trash.filter(x => x.id !== id);
      saveWorkspace();
      ui.active = restoredKey;
      render();
    }
    function restoreEntryFromTrash(item) {
      const section = getSection(item.sourceKey);
      if (!section) throwMissingSection(item);
      if (!Array.isArray(state.entries[item.sourceKey])) state.entries[item.sourceKey] = [];
      state.entries[item.sourceKey].push({ ...clone(item.item), updatedAt: new Date().toISOString() });
    }
    function restoreTaskFromTrash(item) { state.tasks.push({ ...clone(item.item), updatedAt: new Date().toISOString() }); }
    function restoreVoiceFromTrash(item) { state.voiceNotes.push({ ...clone(item.item), updatedAt: new Date().toISOString() }); }
    function restoreMediaFromTrash(item) { state.media.push({ ...clone(item.item), updatedAt: new Date().toISOString() }); }
    function restoreSectionFromTrash(item) {
      let section = clone(item.section);
      const originalKey = section.key;
      if (getSection(section.key) || SYSTEM_KEYS.has(section.key)) {
        const baseKey = slugify(`${section.label || "section"}-restored`);
        let key = baseKey, i = 2;
        while (getSection(key) || SYSTEM_KEYS.has(key)) key = `${baseKey}-${i++}`;
        section.key = key;
      }
      state.sections.push({ ...section, visible: true, order: state.sections.length + 1 });
      state.entries[section.key] = clone(item.entries || []);
      if (section.key !== originalKey) {
        state.entries[section.key] = state.entries[section.key].map(entry => ({ ...entry, updatedAt: new Date().toISOString() }));
      }
      return section.key;
    }
    function throwMissingSection(item) {
      alert(`The original section “${item.sourceLabel || item.sourceKey}” no longer exists. Restore that section first, or create it again before restoring this item.`);
      throw new Error("Missing original section");
    }
    function deleteTrashForever(id) {
      ensureTrash();
      const item = state.trash.find(x => x.id === id);
      if (!item) return;
      if (!confirm(`Delete “${item.title || "this item"}” forever? This cannot be undone.`)) return;
      state.trash = state.trash.filter(x => x.id !== id);
      saveWorkspace(); render();
    }
    function emptyTrash() {
      ensureTrash();
      if (!state.trash.length) return;
      if (!confirm("Empty Recently Deleted forever? This cannot be undone.")) return;
      state.trash = [];
      saveWorkspace(); render();
    }

    function openNewEntry(sectionKey) { ui.active = sectionKey; ui.formOpen = true; ui.editingId = null; ui.draft = {}; render(); focusFirst(); }
    function editEntry(sectionKey, id) { const entry = entriesFor(sectionKey).find(x => x.id === id); if (!entry) return; ui.active = sectionKey; ui.formOpen = false; ui.editingId = id; ui.draft = clone(entry); render(); focusFirst(); }
    function openEntry(sectionKey, id) { editEntry(sectionKey, id); }
    function saveEntry(sectionKey) {
      const section = getSection(sectionKey); if (!section) return;
      const titleName = firstTitleField(section);
      if (!String(ui.draft[titleName] || "").trim()) { alert("Please add a title/name before saving."); return; }
      const now = new Date().toISOString();
      if (!Array.isArray(state.entries[sectionKey])) state.entries[sectionKey] = [];
      if (ui.editingId) {
        state.entries[sectionKey] = state.entries[sectionKey].map(item => item.id === ui.editingId ? { ...item, ...ui.draft, id: item.id, updatedAt: now } : item);
      } else {
        state.entries[sectionKey].push({ id: uid(), createdAt: now, updatedAt: now, ...ui.draft });
      }
      ui.formOpen = false; ui.editingId = null; ui.draft = {}; saveWorkspace(); render();
    }
    function deleteEntry(sectionKey, id) {
      const section = getSection(sectionKey);
      const entry = entriesFor(sectionKey).find(item => item.id === id);
      if (!entry) return;
      if (!confirm(`Move “${itemTitle(section, entry)}” to Recently Deleted?`)) return;
      addToTrash({ type: "entry", sourceKey: sectionKey, sourceLabel: section?.label || sectionKey, title: itemTitle(section, entry), item: clone(entry) });
      state.entries[sectionKey] = entriesFor(sectionKey).filter(item => item.id !== id);
      saveWorkspace(); render();
    }

    function openTaskForm() { ui.active = "tasks"; ui.formOpen = true; ui.editingId = null; ui.draft = { column: "Today" }; render(); focusFirst(); }
    function editTask(id) { const task = state.tasks.find(t => t.id === id); if (!task) return; ui.active = "tasks"; ui.formOpen = false; ui.editingId = id; ui.draft = clone(task); render(); focusFirst(); }
    function saveTask() {
      const title = String(ui.draft.title || "").trim(); if (!title) return alert("Add a task title.");
      const now = new Date().toISOString();
      const next = { title, project: ui.draft.project || "", column: TASK_COLUMNS.includes(ui.draft.column) ? ui.draft.column : "Today", notes: ui.draft.notes || "", updatedAt: now };
      if (ui.editingId) state.tasks = state.tasks.map(t => t.id === ui.editingId ? { ...t, ...next } : t);
      else state.tasks.push({ id: uid(), createdAt: now, ...next });
      ui.formOpen = false; ui.editingId = null; ui.draft = {}; saveWorkspace(); render();
    }
    function deleteTask(id) {
      const task = state.tasks.find(t => t.id === id);
      if (!task) return;
      if (!confirm(`Move task “${task.title || "Untitled task"}” to Recently Deleted?`)) return;
      addToTrash({ type: "task", sourceKey: "tasks", sourceLabel: "Tasks", title: task.title || "Untitled task", item: clone(task) });
      state.tasks = state.tasks.filter(t => t.id !== id); saveWorkspace(); render();
    }
    function moveTask(id, column) { state.tasks = state.tasks.map(t => t.id === id ? { ...t, column, updatedAt: new Date().toISOString() } : t); saveWorkspace(); render(); }

    function openSectionForm() { ui.active = "sections"; ui.formOpen = true; ui.editingId = null; ui.sectionDraft = { label: "", icon: "📁", group: "Custom", template: "note", description: "" }; render(); focusFirst(); }
    function editSection(key) { const section = getSection(key); if (!section) return; ui.active = "sections"; ui.formOpen = true; ui.editingId = key; ui.sectionDraft = { ...clone(section), template: "note" }; render(); focusFirst(); }
    function saveSection() {
      const label = String(ui.sectionDraft.label || "").trim(); if (!label) return alert("Add a section name.");
      const nowKey = slugify(label);
      if (ui.editingId) {
        state.sections = state.sections.map(section => section.key === ui.editingId ? { ...section, label, icon: ui.sectionDraft.icon || "📁", group: ui.sectionDraft.group || "Custom", description: ui.sectionDraft.description || "" } : section);
      } else {
        let key = nowKey; let i = 2; while (getSection(key) || SYSTEM_KEYS.has(key)) key = `${nowKey}-${i++}`;
        const fields = clone(FIELD_TEMPLATES[ui.sectionDraft.template || "note"] || FIELD_TEMPLATES.note);
        state.sections.push({ key, label, icon: ui.sectionDraft.icon || "📁", group: ui.sectionDraft.group || "Custom", description: ui.sectionDraft.description || "", fields, order: state.sections.length + 1, visible: true, locked: false });
        state.entries[key] = [];
      }
      ui.formOpen = false; ui.editingId = null; ui.sectionDraft = {}; saveWorkspace(); render();
    }
    function toggleSection(key) { const section = getSection(key); if (!section) return; section.visible = section.visible === false; saveWorkspace(); render(); }
    function deleteSection(key) {
      const section = getSection(key); if (!section) return;
      if (!confirm(`Move section “${section.label}” and its entries to Recently Deleted?`)) return;
      addToTrash({ type: "section", sourceKey: key, sourceLabel: "Edit Sections", title: section.label || key, section: clone(section), entries: clone(entriesFor(key)) });
      state.sections = state.sections.filter(s => s.key !== key);
      delete state.entries[key];
      if (ui.active === key) ui.active = "home";
      saveWorkspace(); render();
    }

    function collectDates() {
      const items = [];
      state.sections.forEach(section => {
        if (section.special) return;
        const df = dateField(section); if (!df) return;
        entriesFor(section.key).forEach(entry => {
          if (entry[df.name]) items.push({ id: entry.id, title: entry[firstTitleField(section)] || entry.title || "Untitled", date: entry[df.name], section: section.label, sectionKey: section.key, project: entry.project || "", notes: entry.notes || entry.content || entry.agenda || "" });
        });
      });
      return items.sort((a, b) => String(a.date).localeCompare(String(b.date)));
    }
    function todayDate() { return new Date().toISOString().slice(0, 10); }
    function sortEntries(a, b) { return String(b.updatedAt || b.createdAt || "").localeCompare(String(a.updatedAt || a.createdAt || "")); }
    function recentEntries(limit) {
      const results = [];
      state.sections.forEach(section => {
        if (section.special) return;
        entriesFor(section.key).forEach(entry => results.push({ ...entry, title: entry[firstTitleField(section)] || entry.title || entry.name || "Untitled", section: section.label, sectionKey: section.key }));
      });
      return results.sort(sortEntries).slice(0, limit);
    }

    function openVoiceForm() { ui.active = "voiceNotes"; ui.formOpen = true; ui.editingId = null; ui.draft = {}; render(); focusFirst(); }
    function saveVoice() {
      const title = ui.draft.title || "Voice note";
      const now = new Date().toISOString();
      if (ui.editingId) state.voiceNotes = state.voiceNotes.map(n => n.id === ui.editingId ? { ...n, ...ui.draft, updatedAt: now } : n);
      else state.voiceNotes.push({ id: uid(), title, content: ui.draft.content || "", createdAt: now, updatedAt: now });
      ui.formOpen = false; ui.editingId = null; ui.draft = {}; saveWorkspace(); render();
    }
    function editVoice(id) { const note = state.voiceNotes.find(n => n.id === id); if (!note) return; ui.active = "voiceNotes"; ui.formOpen = true; ui.editingId = id; ui.draft = clone(note); render(); }
    function deleteVoice(id) {
      const note = state.voiceNotes.find(n => n.id === id);
      if (!note) return;
      if (!confirm(`Move voice note “${note.title || "Voice note"}” to Recently Deleted?`)) return;
      addToTrash({ type: "voice", sourceKey: "voiceNotes", sourceLabel: "Voice Notes", title: note.title || "Voice note", item: clone(note) });
      state.voiceNotes = state.voiceNotes.filter(n => n.id !== id); saveWorkspace(); render();
    }

    async function toggleRecording() {
      if (ui.recording) return stopRecording();
      if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) { alert("Recording is not supported in this browser. You can still add a text voice note."); return; }
      try {
        ui.mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        ui.audioChunks = [];
        ui.mediaRecorder = new MediaRecorder(ui.mediaStream);
        ui.mediaRecorder.ondataavailable = e => { if (e.data.size) ui.audioChunks.push(e.data); };
        ui.mediaRecorder.onstop = () => {
          const blob = new Blob(ui.audioChunks, { type: "audio/webm" });
          const reader = new FileReader();
          reader.onload = () => {
            state.voiceNotes.push({ id: uid(), title: "Voice note", content: "", audioUrl: reader.result, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
            ui.mediaStream?.getTracks().forEach(track => track.stop());
            ui.recording = false; saveWorkspace(); render();
          };
          reader.readAsDataURL(blob);
        };
        ui.mediaRecorder.start(); ui.recording = true; render();
      } catch (error) { alert("Microphone permission was not granted."); console.error(error); }
    }
    function stopRecording() { if (ui.mediaRecorder && ui.mediaRecorder.state !== "inactive") ui.mediaRecorder.stop(); }

    async function captureMedia(file) {
      if (!file) return;
      try {
        const dataUrl = await compressImage(file, 1000, .72);
        state.media.push({ id: uid(), title: file.name || "Media", dataUrl, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
        saveWorkspace(); render();
      } catch (error) { alert("Could not add this image."); console.error(error); }
    }
    function compressImage(file, maxSide, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image(); const reader = new FileReader();
        reader.onerror = reject; img.onerror = reject;
        reader.onload = () => { img.src = reader.result; };
        img.onload = () => {
          const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
          const canvas = document.createElement("canvas"); canvas.width = Math.round(img.width * scale); canvas.height = Math.round(img.height * scale);
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        reader.readAsDataURL(file);
      });
    }
    function renameMedia(id, title) { const item = state.media.find(m => m.id === id); if (item) { item.title = title; item.updatedAt = new Date().toISOString(); saveWorkspace(); } }
    function deleteMedia(id) {
      const media = state.media.find(m => m.id === id);
      if (!media) return;
      if (!confirm(`Move media “${media.title || "Media"}” to Recently Deleted?`)) return;
      addToTrash({ type: "media", sourceKey: "mediaBoard", sourceLabel: "Media Board", title: media.title || "Media", item: clone(media) });
      state.media = state.media.filter(m => m.id !== id); saveWorkspace(); render();
    }

    function downloadBackup() {
      const blob = new Blob([JSON.stringify(publicPayload(), null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `cinepad-pro-backup-${todayDate()}.json`;
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
    }
    function runImport() {
      try {
        const parsed = normalizeWorkspace(JSON.parse(ui.importText));
        parsed.settings = { ...state.settings, ...parsed.settings, storedPassphrase: state.settings.storedPassphrase };
        state = parsed; ui.importText = ""; ui.importStatus = "Imported successfully."; saveWorkspace(); render();
      } catch (error) { ui.importStatus = "Import failed. Check the JSON file."; render(); }
    }

    function generateWorkspaceId() {
      const bytes = new Uint8Array(16); crypto.getRandomValues(bytes);
      state.settings.workspaceId = "cinepad-" + Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
      saveWorkspace(false); render();
    }
    function saveSyncSettings() {
      state.settings.storedPassphrase = state.settings.rememberPassphrase ? ui.syncPassphrase : "";
      saveWorkspace(false);
      ui.syncStatus = "Settings saved"; ui.syncDot = "warn"; render();
    }
    function disableSync() {
      state.settings.autosync = false;
      if (firebase.unsub) firebase.unsub();
      firebase.ready = false;
      ui.syncStatus = "Cloud sync off"; ui.syncDot = "warn";
      saveWorkspace(false); render();
    }

    async function ensureFirebase() {
      if (firebase.modules) return firebase.modules;
      const [appMod, firestoreMod, authMod] = await Promise.all([
        import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"),
        import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js"),
        import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js")
      ]);
      firebase.modules = { ...appMod, ...firestoreMod, ...authMod };
      return firebase.modules;
    }
    function getFirebaseConfig() {
      try { return JSON.parse(state.settings.firebaseConfig); }
      catch { throw new Error("Firebase config is not valid JSON."); }
    }
    function validateSyncInputs() {
      if (!state.settings.firebaseConfig.trim()) throw new Error("Add your Firebase web config JSON.");
      if (!state.settings.workspaceId.trim()) throw new Error("Add or generate a Workspace ID.");
      if (!ui.syncPassphrase.trim()) throw new Error("Add your sync passphrase.");
    }

    async function connectSync() {
      try {
        ui.syncBusy = true; ui.syncStatus = "Connecting…"; ui.syncDot = "warn"; render();
        validateSyncInputs();
        const m = await ensureFirebase();
        if (!firebase.app) firebase.app = m.initializeApp(getFirebaseConfig());
        if (!firebase.auth) firebase.auth = m.getAuth(firebase.app);
        if (!firebase.db) firebase.db = m.getFirestore(firebase.app);
        await m.signInAnonymously(firebase.auth);
        firebase.ready = true;
        const ref = m.doc(firebase.db, "cinepadPro", state.settings.workspaceId.trim());
        const snap = await m.getDoc(ref);
        if (snap.exists() && snap.data().encrypted) {
          await applyRemoteSnapshot(snap.data());
        } else {
          await pushCloudNow(false);
        }
        if (firebase.unsub) firebase.unsub();
        firebase.unsub = m.onSnapshot(ref, async snapshot => {
          if (snapshot.exists()) await applyRemoteSnapshot(snapshot.data());
        });
        state.settings.autosync = true;
        saveSyncSettings();
        ui.syncStatus = "Cloud sync connected"; ui.syncDot = "good";
      } catch (error) {
        ui.syncStatus = error.message || "Sync failed"; ui.syncDot = "bad"; firebase.ready = false;
      } finally { ui.syncBusy = false; render(); }
    }

    async function applyRemoteSnapshot(data) {
      const remoteMillis = Number(data.updatedAtMillis || 0);
      if (!remoteMillis || remoteMillis <= (state.cloudMeta.lastRemoteMillis || 0)) return;
      if (data.clientId === state.clientId) { state.cloudMeta.lastRemoteMillis = remoteMillis; saveWorkspace(false); return; }
      const remote = await decryptWorkspace(data.encrypted, ui.syncPassphrase, state.settings.workspaceId.trim());
      cloud.suppressNextPush = true;
      const keepSettings = clone(state.settings);
      state = normalizeWorkspace(remote);
      state.settings = { ...keepSettings, firebaseConfig: keepSettings.firebaseConfig, workspaceId: keepSettings.workspaceId, autosync: keepSettings.autosync, rememberPassphrase: keepSettings.rememberPassphrase, storedPassphrase: keepSettings.storedPassphrase };
      state.cloudMeta.lastPull = new Date().toISOString();
      state.cloudMeta.lastRemoteMillis = remoteMillis;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      cloud.lastRemoteMillis = remoteMillis;
      cloud.suppressNextPush = false;
      ui.syncStatus = "Pulled latest cloud data"; ui.syncDot = "good";
      render();
    }

    function scheduleCloudPush() {
      clearTimeout(cloud.pushTimer);
      cloud.pushTimer = setTimeout(() => pushCloudNow(false), 900);
    }

    async function pushCloudNow(showRender = true) {
      try {
        validateSyncInputs();
        const m = await ensureFirebase();
        if (!firebase.app) firebase.app = m.initializeApp(getFirebaseConfig());
        if (!firebase.auth) firebase.auth = m.getAuth(firebase.app);
        if (!firebase.db) firebase.db = m.getFirestore(firebase.app);
        await m.signInAnonymously(firebase.auth);
        firebase.ready = true;
        ui.syncStatus = "Encrypting and pushing…"; ui.syncDot = "warn"; if (showRender) render();
        const encrypted = await encryptWorkspace(publicPayload(), ui.syncPassphrase, state.settings.workspaceId.trim());
        const updatedAtMillis = Date.now();
        const ref = m.doc(firebase.db, "cinepadPro", state.settings.workspaceId.trim());
        await m.setDoc(ref, { encrypted, updatedAtMillis, clientId: state.clientId, appVersion: APP_VERSION, serverUpdatedAt: m.serverTimestamp() }, { merge: true });
        state.cloudMeta.lastPush = new Date().toISOString();
        state.cloudMeta.lastRemoteMillis = updatedAtMillis;
        ui.syncStatus = "Pushed to cloud"; ui.syncDot = "good";
        saveWorkspace(false);
      } catch (error) { ui.syncStatus = error.message || "Cloud push failed"; ui.syncDot = "bad"; }
      finally { if (showRender) render(); }
    }

    async function deriveKey(passphrase, workspaceId) {
      const enc = new TextEncoder();
      const material = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey({ name: "PBKDF2", salt: enc.encode("cinepad-pro:" + workspaceId), iterations: 150000, hash: "SHA-256" }, material, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    }
    function bytesToBase64(bytes) { return btoa(String.fromCharCode(...new Uint8Array(bytes))); }
    function base64ToBytes(base64) { return Uint8Array.from(atob(base64), c => c.charCodeAt(0)); }
    async function encryptWorkspace(payload, passphrase, workspaceId) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(passphrase, workspaceId);
      const data = new TextEncoder().encode(JSON.stringify(payload));
      const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data);
      return { iv: bytesToBase64(iv), cipher: bytesToBase64(cipher) };
    }
    async function decryptWorkspace(encrypted, passphrase, workspaceId) {
      const key = await deriveKey(passphrase, workspaceId);
      const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: base64ToBytes(encrypted.iv) }, key, base64ToBytes(encrypted.cipher));
      return JSON.parse(new TextDecoder().decode(plain));
    }

    function registerServiceWorker() {
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(console.warn));
      }
    }

    function init() {
      loadWorkspace();
      ui.syncPassphrase = state.settings.rememberPassphrase ? state.settings.storedPassphrase || "" : "";
      render(); registerServiceWorker();
      if (state.settings.autosync && ui.syncPassphrase) connectSync();
    }

    init();
  </script>
</body>
